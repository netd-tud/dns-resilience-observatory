<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DNS Resilience Observatory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
    <style>
        :root {
            --kindns-teal: #58c4c4;
            --kindns-blue: #4463ae;
            --ink: #1f2430;
            --muted: #5f6674;
            --border: #e2e6ef;
            --panel: #ffffff;
            --surface: #f7f9fc;
            --danger: #e45757;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Open Sans", Arial, Helvetica, sans-serif;
            color: var(--ink);
            background: #ffffff;
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .menubar {
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            padding: 12px 6vw;
        }

        .menu-inner {
            max-width: 1080px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .menu-title {
            font-weight: 700;
            color: var(--kindns-blue);
            letter-spacing: 0.02em;
        }

        .menu-link {
            font-weight: 600;
            color: var(--kindns-blue);
        }

        .banner {
            background: var(--kindns-teal);
            padding: 32px 6vw;
        }

        .banner-inner {
            max-width: 960px;
            margin: 0 auto;
            text-align: center;
        }

        .banner h1 {
            margin: 0;
            font-size: clamp(1.8rem, 3.2vw, 2.8rem);
            color: #ffffff;
            font-weight: 700;
        }

        .content {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 6vw 48px;
            display: grid;
            gap: 24px;
        }

        .query-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            background: var(--panel);
        }

        .query-grid {
            display: grid;
            grid-template-columns: minmax(200px, 1fr) auto;
            gap: 12px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--kindns-blue);
            box-shadow: 0 0 0 3px rgba(68, 99, 174, 0.15);
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: var(--kindns-blue);
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #364f9c;
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .chip {
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--kindns-blue);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .chip:hover {
            border-color: var(--kindns-blue);
            background: rgba(68, 99, 174, 0.08);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin-top: 10px;
            color: var(--muted);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--kindns-teal);
        }

        .results {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            background: var(--panel);
        }

        .results table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .results th,
        .results td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
        }

        .results th {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.72rem;
        }

        .empty {
            color: var(--muted);
        }

        .tile {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            background: var(--surface);
            display: grid;
            gap: 16px;
        }

        .tile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .tile-title {
            font-size: clamp(1.4rem, 3vw, 2.2rem);
            font-weight: 700;
            color: var(--kindns-blue);
        }

        .tile-meta {
            font-size: 0.95rem;
            color: var(--muted);
        }

        .tile-details {
            display: grid;
            gap: 10px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
        }

        .detail-value {
            font-weight: 700;
            color: var(--kindns-blue);
        }

        .detail-indent {
            margin-left: 18px;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .check {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .checkmark {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: #ffffff;
            background: var(--kindns-teal);
            text-transform: uppercase;
        }

        .checkmark.off {
            background: var(--danger);
        }

        .map-wrap {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            height: 320px;
        }

        .leaflet-container {
            font-family: "Open Sans", Arial, Helvetica, sans-serif;
        }

        footer {
            background: var(--kindns-teal);
            color: #ffffff;
            padding: 20px 6vw;
            text-align: center;
            font-size: 0.9rem;
        }

        @media (max-width: 720px) {
            .menu-inner {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }

            .query-grid {
                grid-template-columns: 1fr;
            }

            .detail-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="menubar">
        <div class="menu-inner">
            <div class="menu-title">DNS Resilience Observatory</div>
            <a class="menu-link" href="/">Dashboard</a>
        </div>
    </header>

    <section class="banner">
        <div class="banner-inner">
            <h1>Resilience of Recursive DNS Resolvers</h1>
        </div>
    </section>

    <main class="content">
        <section class="query-card">
            <div class="query-grid">
                <input id="query-input" type="text" placeholder="Query by resolver IP, prefix, ASN, or country" />
                <button id="search-button" type="button">Run Lookup</button>
            </div>
            <div class="examples">
                <span class="chip" data-value="1.1.1.1">1.1.1.1</span>
                <span class="chip" data-value="9.9.9.0/24">9.9.9.0/24</span>
                <span class="chip" data-value="AS15169">AS15169</span>
                <span class="chip" data-value="DE">DE</span>
            </div>
            <div class="status" id="status">
                <span class="status-dot"></span>
                <span id="status-text">Ready for a lookup.</span>
            </div>
        </section>

        <section class="results" id="results">
            <div class="empty">Results appear here after a lookup.</div>
        </section>
    </main>

    <footer>
        DNS Resilience Observatory
    </footer>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script>
        const apiBaseUrl = "{{ api_base_url }}".replace(/\/+$/, "");
        const input = document.getElementById("query-input");
        const results = document.getElementById("results");
        const statusText = document.getElementById("status-text");
        const statusDot = document.querySelector(".status-dot");

        function setStatus(message, tone) {
            statusText.textContent = message;
            if (tone === "ok") {
                statusDot.style.background = "var(--kindns-teal)";
            } else if (tone === "error") {
                statusDot.style.background = "var(--danger)";
            } else {
                statusDot.style.background = "var(--kindns-blue)";
            }
        }

        function detectQueryType(value) {
            const trimmed = value.trim();
            if (!trimmed) {
                return null;
            }
            if (trimmed.includes("/")) {
                return "prefix";
            }
            const upper = trimmed.toUpperCase();
            if (upper.startsWith("AS") || /^\d{1,10}$/.test(trimmed)) {
                return "asn";
            }
            if (/^[A-Za-z]{2}$/.test(trimmed)) {
                return "country";
            }
            if (trimmed.includes(":")) {
                return "resolver";
            }
            if (/^\d{1,3}(?:\.\d{1,3}){3}$/.test(trimmed)) {
                return "resolver";
            }
            return null;
        }

        function buildEndpoint(query, type) {
            if (type === "resolver") {
                return `${apiBaseUrl}/api/dns-resilience/resolver/${encodeURIComponent(query)}`;
            }
            if (type === "prefix") {
                const encoded = encodeURIComponent(encodeURIComponent(query));
                return `${apiBaseUrl}/api/dns-resilience/prefix/${encoded}`;
            }
            if (type === "asn") {
                const normalized = query.toUpperCase().startsWith("AS") ? query.toUpperCase() : `AS${query}`;
                return `${apiBaseUrl}/api/dns-resilience/ASN/${encodeURIComponent(normalized)}`;
            }
            if (type === "country") {
                return `${apiBaseUrl}/api/dns-resilience/country/${encodeURIComponent(query.toUpperCase())}`;
            }
            return null;
        }

        function renderResults(payload) {
            if (!payload || !payload.resolvers || payload.resolvers.length === 0) {
                results.innerHTML = `<div class="empty">No resolvers found for ${payload ? payload.target : "this query"}.</div>`;
                return;
            }

            const rows = payload.resolvers.map((resolver) => {
                const ip = resolver.ipv4 || resolver.ipv6 || "-";
                return `
                    <tr>
                        <td>${ip}</td>
                        <td>${resolver.asn ?? "-"}</td>
                        <td>${resolver.bgp_prefix ?? "-"}</td>
                        <td>${resolver.country ?? "-"}</td>
                        <td>${resolver.org_short || resolver.org || "-"}</td>
                        <td>${resolver.is_public ? "yes" : "no"}</td>
                    </tr>
                `;
            }).join("");

            results.innerHTML = `
                <div class="empty">${payload.total} resolvers matched</div>
                <table>
                    <thead>
                        <tr>
                            <th>Resolver</th>
                            <th>ASN</th>
                            <th>Prefix</th>
                            <th>Country</th>
                            <th>Organization</th>
                            <th>Public</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;
        }

        function renderResolverSummary(summary) {
            const checkmark = (value) => {
                const cls = value ? "checkmark" : "checkmark off";
                const label = value ? "OK" : "NO";
                return `<span class="${cls}">${label}</span>`;
            };

            const mapId = `map-${Date.now()}`;
            const anycastDetails = summary.anycast_found
                ? `
                    <div class="detail-indent">Anycast sites: <strong>${summary.anycast_site_count}</strong></div>
                    <div class="detail-indent">Countries: <strong>${summary.anycast_country_count}</strong></div>
                    <div class="detail-indent">ASNs: <strong>${summary.anycast_asn_count}</strong></div>
                `
                : `<div class="detail-indent">No anycast sites available.</div>`;

            results.innerHTML = `
                <div class="tile">
                    <div class="tile-header">
                        <div class="tile-title">${summary.resolver_ip}</div>
                        <div class="tile-meta">Resolver overview</div>
                    </div>
                    <div class="tile-details">
                        <div class="detail-row">
                            <span class="detail-label">In Resolver database</span>
                            <span class="detail-value check">${checkmark(summary.resolver_found)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Anycast</span>
                            <span class="detail-value check">${checkmark(summary.anycast_found)}</span>
                        </div>
                        ${anycastDetails}
                    </div>
                    <div class="map-wrap" id="${mapId}"></div>
                </div>
            `;

            if (summary.anycast_countries && summary.anycast_countries.length > 0) {
                initMap(mapId, summary.anycast_countries);
            } else {
                const mapEl = document.getElementById(mapId);
                if (mapEl) {
                    mapEl.innerHTML = `<div class="empty" style="padding: 16px;">No anycast country data to display.</div>`;
                }
            }
        }

        function initMap(containerId, countries) {
            const map = L.map(containerId, {
                zoomControl: true,
                scrollWheelZoom: true,
            }).setView([20, 0], 2);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "&copy; OpenStreetMap contributors",
            }).addTo(map);

            countries.forEach((country) => {
                if (country.latitude == null || country.longitude == null) {
                    return;
                }
                const siteCount = Math.max(0, Number(country.site_count) || 0);
                const radius = Math.min(18, 4 + Math.log10(siteCount + 1) * 6);
                L.circleMarker([country.latitude, country.longitude], {
                    radius,
                    fillColor: "#58c4c4",
                    color: "#4463ae",
                    weight: 1,
                    fillOpacity: 0.7,
                })
                    .addTo(map)
                    .bindTooltip(`${country.country}: ${country.site_count} site(s)`);
            });
        }

        async function runLookup() {
            const query = input.value.trim();
            const type = detectQueryType(query);
            if (!type) {
                setStatus("Enter an IP, prefix, ASN, or country code.", "error");
                return;
            }

            setStatus("Fetching resolver data...", "pending");
            results.innerHTML = `<div class="empty">Loading...</div>`;

            try {
                if (type === "resolver") {
                    const summaryEndpoint = `${apiBaseUrl}/api/dns-resilience/resolver/${encodeURIComponent(query)}/summary`;
                    const summaryResponse = await fetch(summaryEndpoint);
                    const summaryPayload = await summaryResponse.json();
                    if (!summaryResponse.ok) {
                        setStatus(summaryPayload.detail || summaryPayload.error || "Lookup failed.", "error");
                        results.innerHTML = `<div class="empty">${summaryPayload.detail || summaryPayload.error || "Request failed."}</div>`;
                        return;
                    }
                    setStatus("Resolver summary loaded.", "ok");
                    renderResolverSummary(summaryPayload);
                    return;
                }

                const endpoint = buildEndpoint(query, type);
                if (!endpoint) {
                    setStatus("Unable to build endpoint for query.", "error");
                    return;
                }
                const response = await fetch(endpoint);
                const payload = await response.json();
                if (!response.ok) {
                    setStatus(payload.detail || payload.error || "Lookup failed.", "error");
                    results.innerHTML = `<div class="empty">${payload.detail || payload.error || "Request failed."}</div>`;
                    return;
                }
                setStatus(`Found ${payload.total} resolver(s).`, "ok");
                renderResults(payload);
            } catch (error) {
                setStatus("Network error while reaching the API.", "error");
                results.innerHTML = `<div class="empty">${error}</div>`;
            }
        }

        document.getElementById("search-button").addEventListener("click", runLookup);
        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                runLookup();
            }
        });

        document.querySelectorAll(".chip").forEach((chip) => {
            chip.addEventListener("click", () => {
                input.value = chip.dataset.value;
                runLookup();
            });
        });
    </script>
</body>
</html>
