<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DNS Resilience Observatory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
    <link rel="stylesheet" href="/static/frontend/styles.css" />
</head>
<body>
    <header class="menubar">
        <div class="menu-inner">
            <div class="menu-title">DNS Resilience Observatory</div>
            <a class="menu-link" href="/">Dashboard</a>
        </div>
    </header>

    <section class="banner">
        <div class="banner-inner">
            <h1>Resilience of Recursive DNS Resolvers</h1>
        </div>
    </section>

    <main class="content">
        <section class="query-card">
            <div class="query-grid">
                <input id="query-input" type="text" placeholder="Query by resolver IP, prefix, ASN, or country" />
                <button id="search-button" type="button">Run Lookup</button>
            </div>
            <div class="examples">
                <span class="chip" data-value="1.1.1.1">1.1.1.1</span>
                <span class="chip" data-value="9.9.9.0/24">9.9.9.0/24</span>
                <span class="chip" data-value="AS3320">AS3320</span>
                <span class="chip" data-value="DE">DE</span>
            </div>
            <div class="status" id="status">
                <span class="status-dot"></span>
                <span id="status-text">Ready for a lookup.</span>
            </div>
        </section>

        <section class="results" id="results">
            <div class="empty">Results appear here after a lookup.</div>
        </section>
    </main>

    <footer>
        DNS Resilience Observatory
    </footer>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script>
        const apiBaseUrl = "{{ api_base_url }}".replace(/\/+$/, "");
        const input = document.getElementById("query-input");
        const results = document.getElementById("results");
        const statusText = document.getElementById("status-text");
        const statusDot = document.querySelector(".status-dot");

        function loadPlotly() {
            if (window.Plotly) {
                return Promise.resolve();
            }
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = "https://unpkg.com/plotly.js-dist-min@2.32.0/plotly.min.js";
                script.onload = () => resolve();
                script.onerror = () => reject(new Error("Failed to load Plotly"));
                document.head.appendChild(script);
            });
        }

        function setStatus(message, tone) {
            statusText.textContent = message;
            if (tone === "ok") {
                statusDot.style.background = "var(--kindns-teal)";
            } else if (tone === "error") {
                statusDot.style.background = "var(--danger)";
            } else {
                statusDot.style.background = "var(--kindns-blue)";
            }
        }

        function detectQueryType(value) {
            const trimmed = value.trim();
            if (!trimmed) {
                return null;
            }
            if (trimmed.includes("/")) {
                return "prefix";
            }
            const upper = trimmed.toUpperCase();
            if (upper.startsWith("AS") || /^\d{1,10}$/.test(trimmed)) {
                return "asn";
            }
            if (/^[A-Za-z]{2}$/.test(trimmed)) {
                return "country";
            }
            if (trimmed.includes(":")) {
                return "resolver";
            }
            if (/^\d{1,3}(?:\.\d{1,3}){3}$/.test(trimmed)) {
                return "resolver";
            }
            return null;
        }

        function buildEndpoint(query, type) {
            if (type === "resolver") {
                return `${apiBaseUrl}/api/dns-resilience/resolver/${encodeURIComponent(query)}`;
            }
            if (type === "prefix") {
                const encoded = encodeURIComponent(encodeURIComponent(query));
                return `${apiBaseUrl}/api/dns-resilience/prefix/${encoded}`;
            }
            if (type === "asn") {
                const normalized = query.toUpperCase().startsWith("AS") ? query.toUpperCase() : `AS${query}`;
                return `${apiBaseUrl}/api/dns-resilience/ASN/${encodeURIComponent(normalized)}`;
            }
            if (type === "country") {
                return `${apiBaseUrl}/api/dns-resilience/country/${encodeURIComponent(query.toUpperCase())}`;
            }
            return null;
        }

        function renderResults(payload) {
            if (!payload || !payload.resolvers || payload.resolvers.length === 0) {
                results.innerHTML = `<div class="empty">No resolvers found for ${payload ? payload.target : "this query"}.</div>`;
                return;
            }

            const countrySummary = payload.target_type === "country"
                ? `
                    <div class="detail-row">
                        <span class="detail-label">Public resolvers</span>
                        <span class="detail-value">${payload.public_resolver_count ?? "-"}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Closed resolvers</span>
                        <span class="detail-value">${payload.closed_resolver_count ?? "-"}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Forwarders</span>
                        <span class="detail-value">${payload.forwarder_count ?? "-"}</span>
                    </div>
                `
                : "";

            if (payload.target_type === "country") {
                results.innerHTML = `
                    <div class="tile">
                        <div class="tile-header">
                            <div class="tile-title">${payload.target}</div>
                            <div class="tile-meta">Country overview</div>
                        </div>
                        <div class="tile-details">
                            ${countrySummary}
                        </div>
                    </div>
                `;
                return;
            }

            const rows = payload.resolvers.map((resolver) => {
                const ip = resolver.ipv4 || resolver.ipv6 || "-";
                return `
                    <tr>
                        <td>${ip}</td>
                        <td>${resolver.asn ?? "-"}</td>
                        <td>${resolver.bgp_prefix ?? "-"}</td>
                        <td>${resolver.country ?? "-"}</td>
                        <td>${resolver.org_short || resolver.org || "-"}</td>
                        <td>${resolver.is_public ? "yes" : "no"}</td>
                    </tr>
                `;
            }).join("");

            results.innerHTML = `
                <div class="empty">${payload.total} resolvers matched</div>
                <table>
                    <thead>
                        <tr>
                            <th>Resolver</th>
                            <th>ASN</th>
                            <th>Prefix</th>
                            <th>Country</th>
                            <th>Organization</th>
                            <th>Public</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;
        }

        function renderResolverSummary(summary) {
            const checkmark = (value) => {
                if (value === null || value === undefined) {
                    return "-";
                }
                const cls = value ? "checkmark" : "checkmark off";
                const symbol = value ? "✓" : "✕";
                return `<span class="${cls}">${symbol}</span>`;
            };

            const forwarderCounts = summary.forwarder_countries || [];
            const forwarderGraphId = `forwarder-${Date.now()}`;
            const forwarderToggleId = `forwarder-toggle-${Date.now()}`;

            const mapId = `map-${Date.now()}`;
            const anycastDetails = summary.anycast_found
                ? `
                    <div class="detail-indent">Anycast sites: <strong>${summary.anycast_site_count}</strong></div>
                    <div class="detail-indent">Countries: <strong>${summary.anycast_country_count}</strong></div>
                    <div class="detail-indent">ASNs: <strong>${summary.anycast_asn_count}</strong></div>
                `
                : `<div class="detail-indent">No anycast sites available.</div>`;

            const lastObservation = summary.last_observation_ts
                ? new Date(summary.last_observation_ts).toLocaleString()
                : "-";

            results.innerHTML = `
                <div class="tile">
                    <div class="tile-header">
                        <div class="tile-title">${summary.resolver_ip}</div>
                    </div>
                    <div class="tile-details">
                        <div class="detail-row">
                            <span class="detail-label">In Resolver database</span>
                            <span class="detail-value check">${checkmark(summary.resolver_found)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Public resolver</span>
                            <span class="detail-value check">${checkmark(summary.resolver_is_public)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Last observed in measurements</span>
                            <span class="detail-value">${lastObservation}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Open forwarder IPs relaying to ${summary.resolver_ip} [#]</span>
                            <span class="detail-value">${summary.forwarder_entry_count ?? 0}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">ASNs with open forwarders that relay queries to ${summary.resolver_ip} [#]</span>
                            <span class="detail-value">${summary.forwarder_asn_count ?? 0}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Countries with open forwarders that relay queries to ${summary.resolver_ip} [#]</span>
                            <span class="detail-value">${summary.forwarder_country_count ?? 0}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Anycast</span>
                            <span class="detail-value check">${checkmark(summary.anycast_found)}</span>
                        </div>
                        ${anycastDetails}
                    </div>
                    <div class="map-wrap" id="${mapId}"></div>
                    <div class="graph-section">
                        <div class="tile-header">
                            <div class="tile-title">Countries with open forwarders that relay queries to ${summary.resolver_ip}</div>
                            <button class="graph-toggle" id="${forwarderToggleId}" type="button">Show all</button>
                        </div>
                        <div class="graph-wrap" id="${forwarderGraphId}"></div>
                    </div>
                </div>
            `;

            if (summary.anycast_countries && summary.anycast_countries.length > 0) {
                initMap(mapId, summary.anycast_countries);
            } else {
                const mapEl = document.getElementById(mapId);
                if (mapEl) {
                    mapEl.innerHTML = `<div class="empty" style="padding: 16px;">No anycast country data to display.</div>`;
                }
            }

            const graphEl = document.getElementById(forwarderGraphId);
            const toggleEl = document.getElementById(forwarderToggleId);
            if (graphEl) {
                if (!forwarderCounts.length) {
                    graphEl.innerHTML = `<div class="empty">No forwarder country data to display.</div>`;
                } else {
                    const sorted = [...forwarderCounts].sort((a, b) => b.count - a.count);
                    let showAll = false;

                    const renderForwarderGraph = () => {
                        const entries = showAll ? sorted : sorted.slice(0, 10);
                        const totalCount = entries.reduce((sum, entry) => sum + (entry.count || 0), 0);

                        const labels = [
                            ...entries.map((entry) => entry.country || "-"),
                            `${summary.resolver_ip} (${totalCount})`,
                        ];
                        const resolverIndex = labels.length - 1;

                        const sources = entries.map((_, index) => index);
                        const targets = entries.map(() => resolverIndex);
                        const values = entries.map((entry) => entry.count || 0);

                        const data = [
                            {
                                type: "sankey",
                                orientation: "h",
                                node: {
                                    label: labels,
                                    pad: 18,
                                    thickness: 20,
                                    color: [
                                        ...entries.map(() => "#d9f2ef"),
                                        "#4463ae",
                                    ],
                                    line: {
                                        color: [
                                            ...entries.map(() => "#58c4c4"),
                                            "#2e4686",
                                        ],
                                        width: 1,
                                    },
                                },
                                link: {
                                    source: sources,
                                    target: targets,
                                    value: values,
                                    color: values.map(() => "rgba(68, 99, 174, 0.35)"),
                                },
                            },
                        ];

                        const layout = {
                            margin: { l: 20, r: 20, t: 10, b: 10 },
                            paper_bgcolor: "#ffffff",
                            plot_bgcolor: "#ffffff",
                            font: {
                                family: "Open Sans, Arial, Helvetica, sans-serif",
                                color: "#1f2430",
                                size: 12,
                            },
                        };

                        loadPlotly()
                            .then(() => {
                                Plotly.react(graphEl, data, layout, {
                                    displayModeBar: true,
                                    responsive: true,
                                    scrollZoom: true,
                                });
                            })
                            .catch(() => {
                                graphEl.innerHTML = `<div class="empty">Plotly failed to load.</div>`;
                            });
                    };

                    renderForwarderGraph();

                    if (toggleEl) {
                        toggleEl.textContent = "Show all";
                        toggleEl.addEventListener("click", () => {
                            showAll = !showAll;
                            toggleEl.textContent = showAll ? "Show top 10" : "Show all";
                            renderForwarderGraph();
                        });
                    }
                }
            }
        }

        function initMap(containerId, countries) {
            const map = L.map(containerId, {
                zoomControl: true,
                scrollWheelZoom: true,
            }).setView([20, 0], 2);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "&copy; OpenStreetMap contributors",
            }).addTo(map);

            countries.forEach((country) => {
                if (country.latitude == null || country.longitude == null) {
                    return;
                }
                const siteCount = Math.max(0, Number(country.site_count) || 0);
                const radius = Math.min(18, 4 + Math.log10(siteCount + 1) * 6);
                L.circleMarker([country.latitude, country.longitude], {
                    radius,
                    fillColor: "#58c4c4",
                    color: "#4463ae",
                    weight: 1,
                    fillOpacity: 0.7,
                })
                    .addTo(map)
                    .bindTooltip(`${country.country}: ${country.site_count} site(s)`);
            });
        }

        async function runLookup() {
            const query = input.value.trim();
            const type = detectQueryType(query);
            if (!type) {
                setStatus("Enter an IP, prefix, ASN, or country code.", "error");
                return;
            }

            setStatus("Fetching resolver data...", "pending");
            results.innerHTML = `<div class="empty">Loading... <span class="spinner" aria-hidden="true"></span></div>`;

            try {
                if (type === "resolver") {
                    const summaryEndpoint = `${apiBaseUrl}/api/dns-resilience/resolver/${encodeURIComponent(query)}/summary`;
                    const summaryResponse = await fetch(summaryEndpoint);
                    const summaryPayload = await summaryResponse.json();
                    if (!summaryResponse.ok) {
                        setStatus(summaryPayload.detail || summaryPayload.error || "Lookup failed.", "error");
                        results.innerHTML = `<div class="empty">${summaryPayload.detail || summaryPayload.error || "Request failed."}</div>`;
                        return;
                    }
                    setStatus("Resolver summary loaded.", "ok");
                    renderResolverSummary(summaryPayload);
                    return;
                }

                const endpoint = buildEndpoint(query, type);
                if (!endpoint) {
                    setStatus("Unable to build endpoint for query.", "error");
                    return;
                }
                const response = await fetch(endpoint);
                const payload = await response.json();
                if (!response.ok) {
                    setStatus(payload.detail || payload.error || "Lookup failed.", "error");
                    results.innerHTML = `<div class="empty">${payload.detail || payload.error || "Request failed."}</div>`;
                    return;
                }
                setStatus(`Found ${payload.total} resolver(s).`, "ok");
                renderResults(payload);
            } catch (error) {
                setStatus("Network error while reaching the API.", "error");
                results.innerHTML = `<div class="empty">${error}</div>`;
            }
        }

        document.getElementById("search-button").addEventListener("click", runLookup);
        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                runLookup();
            }
        });

        document.querySelectorAll(".chip").forEach((chip) => {
            chip.addEventListener("click", () => {
                input.value = chip.dataset.value;
                runLookup();
            });
        });
    </script>
</body>
</html>
