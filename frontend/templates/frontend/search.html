{% extends "frontend/base.html" %}

{% block extra_head %}
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
{% endblock %}

{% block banner %}
    <section class="banner" id="page-banner">
        <div class="banner-inner">
            <img class="banner-logo" src="/static/frontend/assets/dns_resilience_observatory_transparent_white_connections.png" alt="DNS Resilience Observatory" />
            <h1>DNS Resolver Search</h1>
        </div>
    </section>
{% endblock %}

{% block content %}
    <main class="content">
        <section class="dashboard-view" id="dashboard-view">
            <section class="query-card">
                <div class="query-grid">
                    <input id="query-input" type="text" placeholder="Query by resolver IP, domain, prefix, ASN, or country" />
                    <button id="search-button" type="button">Run Lookup</button>
                </div>
                <div class="examples">
                    <span class="chip" data-value="1.1.1.1">1.1.1.1</span>
                    <span class="chip" data-value="one.one.one.one">one.one.one.one</span>
                    <span class="chip" data-value="9.9.9.0/24">9.9.9.0/24</span>
                    <span class="chip" data-value="AS3320">AS3320</span>
                    <span class="chip" data-value="DE">DE</span>
                </div>
                <div class="status" id="status">
                    <span class="status-dot"></span>
                    <span id="status-text">Ready for a lookup.</span>
                </div>
            </section>

            <section class="results" id="results">
                <div class="empty">Results appear here after a lookup.</div>
            </section>
        </section>
    </main>
{% endblock %}

{% block scripts %}
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script>
        const apiBaseUrl = "{{ api_base_url }}".replace(/\/+$/, "");
        const input = document.getElementById("query-input");
        const results = document.getElementById("results");
        const statusText = document.getElementById("status-text");
        const statusDot = document.querySelector(".status-dot");

        function loadPlotly() {
            if (window.Plotly) {
                return Promise.resolve();
            }
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = "https://unpkg.com/plotly.js-dist-min@2.32.0/plotly.min.js";
                script.onload = () => resolve();
                script.onerror = () => reject(new Error("Failed to load Plotly"));
                document.head.appendChild(script);
            });
        }

        function setStatus(message, tone) {
            statusText.textContent = message;
            if (tone === "ok") {
                statusDot.style.background = "var(--kindns-teal)";
            } else if (tone === "error") {
                statusDot.style.background = "var(--danger)";
            } else {
                statusDot.style.background = "var(--kindns-blue)";
            }
        }

        function formatNumber(value) {
            return Number(value || 0).toLocaleString();
        }

        function formatPercent(value) {
            return `${Number(value || 0).toFixed(1)}%`;
        }

        function loadingText() {
            return `<span class="inline-loading"><span class="spinner" aria-hidden="true"></span> Loading...</span>`;
        }

        function setHtml(id, value) {
            const element = document.getElementById(id);
            if (element) {
                element.innerHTML = value;
            }
        }

        function setLoadingError(id, message = "Failed to load.") {
            setHtml(id, `<span class="metric-subvalue">${message}</span>`);
        }

        async function fetchApiPath(path) {
            const response = await fetch(`${apiBaseUrl}${path}`);
            const payload = await response.json();
            if (!response.ok) {
                throw new Error(payload.detail || payload.error || `${path} request failed.`);
            }
            return payload;
        }

        function metricCard(label, value, subvalue = "") {
            return `
                <div class="metric-card">
                    <div class="metric-label">${label}</div>
                    <div class="metric-value">${value}</div>
                    ${subvalue ? `<div class="metric-subvalue">${subvalue}</div>` : ""}
                </div>
            `;
        }

        function gauge(label, value, detail) {
            const safeValue = Math.max(0, Math.min(100, Number(value || 0)));
            return `
                <div class="gauge-card">
                    <div class="gauge" style="--value: ${safeValue};">
                        <div class="gauge-inner">
                            <span>${safeValue.toFixed(1)}%</span>
                        </div>
                    </div>
                    <div>
                        <div class="metric-label">${label}</div>
                        <div class="metric-subvalue">${detail}</div>
                    </div>
                </div>
            `;
        }

        function ratioBar(label, firstLabel, firstValue, secondLabel, secondValue) {
            const total = Math.max(Number(firstValue || 0) + Number(secondValue || 0), 1);
            const firstPc = (Number(firstValue || 0) / total) * 100;
            const secondPc = 100 - firstPc;
            return `
                <div class="bar-card">
                    <div class="metric-label">${label}</div>
                    <div class="stacked-bar">
                        <span class="bar-primary" style="width: ${firstPc}%"></span>
                        <span class="bar-secondary" style="width: ${secondPc}%"></span>
                    </div>
                    <div class="bar-legend">
                        <span>${firstLabel}: ${formatNumber(firstValue)}</span>
                        <span>${secondLabel}: ${formatNumber(secondValue)}</span>
                    </div>
                </div>
            `;
        }

        function summaryCard(label, total, firstLabel, firstValue, secondLabel, secondValue, percent, detail = "") {
            const safePercent = Math.max(0, Math.min(100, Number(percent || 0)));
            const barTotal = Math.max(Number(firstValue || 0) + Number(secondValue || 0), 1);
            const firstPc = (Number(firstValue || 0) / barTotal) * 100;
            const secondPc = 100 - firstPc;
            return `
                <div class="summary-card">
                    <div class="summary-card-main">
                        <div>
                            <div class="metric-label">${label}</div>
                            <div class="metric-value">${formatNumber(total)}</div>
                            <div class="metric-subvalue">${detail || "&nbsp;"}</div>
                        </div>
                        <div class="gauge" style="--value: ${safePercent};">
                            <div class="gauge-inner"><span>${safePercent.toFixed(1)}%</span></div>
                        </div>
                    </div>
                    <div>
                        <div class="stacked-bar">
                            <span class="bar-primary" style="width: ${firstPc}%"></span>
                            <span class="bar-secondary" style="width: ${secondPc}%"></span>
                        </div>
                        <div class="bar-legend">
                            <span>${firstLabel}: ${formatNumber(firstValue)}</span>
                            <span>${secondLabel}: ${formatNumber(secondValue)}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function spoofingCard(total, blocked, received, unknown) {
            const safeTotal = Math.max(Number(total || 0), 0);
            const safeBlocked = Math.max(Number(blocked || 0), 0);
            const safeReceived = Math.max(Number(received || 0), 0);
            const safeUnknown = Math.max(Number(unknown || 0), 0);
            const barTotal = Math.max(safeTotal, safeBlocked + safeReceived + safeUnknown, 1);
            const blockedPc = (safeBlocked / barTotal) * 100;
            const receivedPc = (safeReceived / barTotal) * 100;
            const unknownPc = Math.max(0, 100 - blockedPc - receivedPc);
            const warning = safeReceived > 0
                ? `<div class="spoofing-warning">Warning: some networks seem to allow spoofing.</div>`
                : `<div class="metric-subvalue">&nbsp;</div>`;
            return `
                <div class="summary-card spoofing-card">
                    <div>
                        <div class="metric-label">Spoofing</div>
                        <div class="metric-value">${formatNumber(safeTotal)}</div>
                        ${warning}
                    </div>
                    <div>
                        <div class="stacked-bar spoofing-stacked-bar">
                            <span class="spoofing-blocked" style="width: ${blockedPc}%"></span>
                            <span class="spoofing-received" style="width: ${receivedPc}%"></span>
                            <span class="spoofing-unknown" style="width: ${unknownPc}%"></span>
                        </div>
                        <div class="bar-legend spoofing-legend">
                            <span>Blocked: ${formatNumber(safeBlocked)}</span>
                            <span>Received: ${formatNumber(safeReceived)}</span>
                            <span>Unknown: ${formatNumber(safeUnknown)}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function detectQueryType(value) {
            const trimmed = value.trim();
            if (!trimmed) {
                return null;
            }
            if (trimmed.includes("/")) {
                return "prefix";
            }
            const upper = trimmed.toUpperCase();
            if (upper.startsWith("AS") || /^\d{1,10}$/.test(trimmed)) {
                return "asn";
            }
            if (/^[A-Za-z]{2,3}$/.test(trimmed)) {
                return "country";
            }
            if (/^[A-Za-z][A-Za-z0-9.+-]*:\d{1,5}$/.test(trimmed)) {
                return "protocol";
            }
            if (trimmed.includes(":")) {
                return "resolver";
            }
            if (/^\d{1,3}(?:\.\d{1,3}){3}$/.test(trimmed)) {
                return "resolver";
            }
            if (/^[A-Za-z0-9-]+(?:\.[A-Za-z0-9-]+)+\.?$/.test(trimmed)) {
                return "domain";
            }
            return null;
        }

        function singleAddressFromPrefix(value) {
            const trimmed = value.trim();
            const ipv4Match = trimmed.match(/^(\d{1,3}(?:\.\d{1,3}){3})\/32$/);
            if (ipv4Match) {
                return ipv4Match[1];
            }
            const ipv6Match = trimmed.match(/^([0-9A-Fa-f:.]+)\/128$/);
            if (ipv6Match && ipv6Match[1].includes(":")) {
                return ipv6Match[1];
            }
            return null;
        }

        function buildEndpoint(query, type) {
            if (type === "resolver") {
                return `${apiBaseUrl}/api/dns-resilience/resolver/${encodeURIComponent(query)}`;
            }
            if (type === "prefix") {
                const encoded = encodeURIComponent(encodeURIComponent(query));
                return `${apiBaseUrl}/api/dns-resilience/prefix/${encoded}`;
            }
            if (type === "asn") {
                const normalized = query.toUpperCase().startsWith("AS") ? query.toUpperCase() : `AS${query}`;
                return `${apiBaseUrl}/api/dns-resilience/ASN/${encodeURIComponent(normalized)}`;
            }
            if (type === "country") {
                return `${apiBaseUrl}/api/dns-resilience/country/${encodeURIComponent(query.toUpperCase())}`;
            }
            if (type === "domain") {
                return `${apiBaseUrl}/api/dns-resilience/domain/${encodeURIComponent(query)}`;
            }
            if (type === "protocol") {
                return `${apiBaseUrl}/api/dns-resilience/protocol/${encodeURIComponent(query.toLowerCase())}`;
            }
            return null;
        }

        function resolverRows(resolvers) {
            return resolvers.map((resolver) => {
                const ip = resolver.ip || "-";
                const ipCell = ip === "-"
                    ? "-"
                    : `<a class="resolver-link" href="/search.html?q=${encodeURIComponent(ip)}">${ip}</a>`;
                const domainCell = resolver.domain
                    ? resolver.domain.split(",").map((domain) => {
                        const clean = domain.trim();
                        return clean ? `<a class="resolver-link" href="/search.html?q=${encodeURIComponent(clean)}">${clean}</a>` : "";
                    }).filter(Boolean).join(", ")
                    : "-";
                const serviceCell = resolver.supported_protocols
                    ? resolver.supported_protocols.split(",").map((service) => {
                        const clean = service.trim().toLowerCase();
                        return clean ? `<a class="resolver-link" href="/search.html?q=${encodeURIComponent(clean)}">${clean}</a>` : "";
                    }).filter(Boolean).join(", ")
                    : "-";
                return `
                    <tr>
                        <td>${ipCell}</td>
                        <td>${resolver.asn ?? "-"}</td>
                        <td>${resolver.bgp_prefix ?? "-"}</td>
                        <td>${resolver.country ?? "-"}</td>
                        <td>${resolver.org_short || resolver.org || "-"}</td>
                        <td>${domainCell}</td>
                        <td>${serviceCell}</td>
                        <td>${resolver.is_public ? "yes" : "no"}</td>
                    </tr>
                `;
            }).join("");
        }

        function renderResolverTable(container, resolvers, page = 1) {
            const pageSize = 10;
            const totalPages = Math.max(1, Math.ceil(resolvers.length / pageSize));
            const currentPage = Math.min(Math.max(page, 1), totalPages);
            const start = (currentPage - 1) * pageSize;
            const pageRows = resolvers.slice(start, start + pageSize);
            container.innerHTML = `
                <div class="resolver-table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Resolver</th>
                                <th>ASN</th>
                                <th>Prefix</th>
                                <th>Country</th>
                                <th>Organization</th>
                                <th>Domain</th>
                                <th>Protocol:port</th>
                                <th>Public</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${resolverRows(pageRows)}
                        </tbody>
                    </table>
                </div>
                <div class="pager">
                    <button class="pager-button" type="button" data-page="${currentPage - 1}" ${currentPage <= 1 ? "disabled" : ""}>Previous</button>
                    <span>Page ${currentPage} of ${totalPages}</span>
                    <button class="pager-button" type="button" data-page="${currentPage + 1}" ${currentPage >= totalPages ? "disabled" : ""}>Next</button>
                </div>
            `;
            container.querySelectorAll(".pager-button").forEach((button) => {
                button.addEventListener("click", () => {
                    renderResolverTable(container, resolvers, Number(button.dataset.page));
                });
            });
        }

        function renderResults(payload) {
            if (payload && (payload.target_type === "country" || payload.target_type === "asn" || payload.target_type === "prefix")) {
                const isAsn = payload.target_type === "asn";
                const isPrefix = payload.target_type === "prefix";
                const resolverTotal = Number(payload.country_resolver_count ?? payload.total ?? 0);
                const publicCount = Number(payload.public_resolver_count || 0);
                const closedCount = Number(payload.closed_resolver_count || 0);
                const anycastCount = Number(payload.anycast_resolver_count || 0);
                const publicPc = resolverTotal ? (publicCount / resolverTotal) * 100 : 0;
                const anycastOther = Math.max(resolverTotal - anycastCount, 0);
                const anycastPc = Number(payload.anycast_resolver_pc ?? (resolverTotal ? (anycastCount / resolverTotal) * 100 : 0));
                const forwarderTotal = Number(payload.forwarder_count || 0);
                const recursiveForwarders = Number(payload.recursive_forwarder_count || 0);
                const transparentForwarders = Number(payload.transparent_forwarder_count || 0);
                const recursiveForwarderPc = forwarderTotal ? (recursiveForwarders / forwarderTotal) * 100 : 0;
                const qminMeasured = Number(payload.qmin_measured_count || 0);
                const qminYes = Number(payload.qmin_yes_count || 0);
                const qminNo = Number(payload.qmin_no_count || 0);
                const qminUnstable = Number(payload.qmin_unstable_count || 0);
                const qminUnknown = Math.max(resolverTotal - qminMeasured, 0);
                const qminYesPc = Number(payload.qmin_yes_pc ?? (qminMeasured ? (qminYes / qminMeasured) * 100 : 0));
                const qminNoPc = Number(payload.qmin_no_pc ?? (qminMeasured ? (qminNo / qminMeasured) * 100 : 0));
                const spoofingTotal = Number(payload.spoofing_prefix_count || 0);
                const spoofingAllow = Number(payload.spoofing_allow_count || 0);
                const spoofingBlocked = Number(payload.spoofing_blocked_count || 0);
                const spoofingUnknown = Number(payload.spoofing_unknown_count || 0);
                const dnssecValidating = payload.dnssec_validating_pc ?? 0;
                const dnssecPartial = payload.dnssec_partial_validating_pc ?? 0;
                const scopeLabel = isPrefix ? "Prefix overview" : (isAsn ? "AS overview" : "Country overview");
                const dnssecScope = isPrefix ? "Prefix-level" : (isAsn ? "AS-level" : "Country-level");
                results.innerHTML = `
                    <div class="dashboard-section">
                        <div class="section-header">
                            <div>
                                <h2>${payload.target}</h2>
                                <p>${scopeLabel}</p>
                            </div>
                        </div>
                        <div class="metric-grid">
                            ${summaryCard("Resolvers", resolverTotal, "Public", publicCount, "Non-public", closedCount, publicPc)}
                            ${summaryCard("Forwarders", forwarderTotal, "Recursive", recursiveForwarders, "Transparent", transparentForwarders, recursiveForwarderPc)}
                            ${summaryCard("Anycast", anycastCount, "Anycast", anycastCount, "Other", anycastOther, anycastPc, `${formatNumber(payload.anycast_prefix_count || 0)} prefixes / ${formatNumber(payload.anycast_country_instance_count || 0)} country instances / ${formatNumber(payload.anycast_asn_instance_count || 0)} ASN instances`)}
                            ${summaryCard("QMIN", qminMeasured, "Yes", qminYes, "No", qminNo, qminYesPc, `${formatNumber(qminUnstable)} unstable / ${formatNumber(qminUnknown)} not measured`)}
                            ${spoofingCard(spoofingTotal, spoofingBlocked, spoofingAllow, spoofingUnknown)}
                            ${gauge("DNSSEC validating", dnssecValidating, payload.dnssec_validating_pc == null ? `No ${dnssecScope.toLowerCase()} DNSSEC data` : `${dnssecScope} validation`)}
                            ${gauge("DNSSEC partial validating", dnssecPartial, payload.dnssec_partial_validating_pc == null ? `No ${dnssecScope.toLowerCase()} DNSSEC data` : `${dnssecScope} partial validation`)}
                        </div>
                    </div>
                    ${isPrefix && payload.resolvers && payload.resolvers.length
                        ? `<div class="dashboard-section">
                            <div class="section-header">
                                <div>
                                    <h2>Resolvers in prefix</h2>
                                    <p>${formatNumber(payload.resolvers.length)} shown, 10 per page</p>
                                </div>
                            </div>
                            <div id="prefix-resolver-table"></div>
                        </div>`
                        : ""}
                `;
                if (isPrefix && payload.resolvers && payload.resolvers.length) {
                    renderResolverTable(document.getElementById("prefix-resolver-table"), payload.resolvers);
                }
                return;
            }

            if (!payload || !payload.resolvers || payload.resolvers.length === 0) {
                results.innerHTML = `<div class="empty">No resolvers found for ${payload ? payload.target : "this query"}.</div>`;
                return;
            }

            results.innerHTML = `
                <div class="empty">${payload.total} resolvers matched</div>
                <div id="generic-resolver-table"></div>
            `;
            renderResolverTable(document.getElementById("generic-resolver-table"), payload.resolvers);
        }

        function renderScopedResultsAsync(payload, type) {
            const isAsn = type === "asn";
            const isCountry = type === "country";
            const targetPath = isAsn
                ? `/api/dns-resilience/ASN/${encodeURIComponent(payload.target)}`
                : `/api/dns-resilience/country/${encodeURIComponent(payload.target)}`;
            const resolverTotal = Number(payload.country_resolver_count ?? payload.total ?? 0);
            const publicCount = Number(payload.public_resolver_count || 0);
            const closedCount = Number(payload.closed_resolver_count || 0);
            const anycastCount = Number(payload.anycast_resolver_count || 0);
            const publicPc = resolverTotal ? (publicCount / resolverTotal) * 100 : 0;
            const anycastOther = Math.max(resolverTotal - anycastCount, 0);
            const anycastPc = Number(payload.anycast_resolver_pc ?? (resolverTotal ? (anycastCount / resolverTotal) * 100 : 0));
            const forwarderTotal = Number(payload.forwarder_count || 0);
            const recursiveForwarders = Number(payload.recursive_forwarder_count || 0);
            const transparentForwarders = Number(payload.transparent_forwarder_count || 0);
            const recursiveForwarderPc = forwarderTotal ? (recursiveForwarders / forwarderTotal) * 100 : 0;
            const scopeLabel = isAsn ? "AS overview" : "Country overview";
            const dnssecCard = isCountry
                ? `<div id="scoped-dnssec-card">${gauge("DNSSEC validating", 0, loadingText())}</div>`
                : "";

            results.innerHTML = `
                <div class="dashboard-section">
                    <div class="section-header">
                        <div>
                            <h2>${payload.target}</h2>
                            <p>${scopeLabel}</p>
                        </div>
                    </div>
                    <div class="metric-grid">
                        ${summaryCard("Resolvers", resolverTotal, "Public", publicCount, "Non-public", closedCount, publicPc)}
                        ${summaryCard("Forwarders", forwarderTotal, "Recursive", recursiveForwarders, "Transparent", transparentForwarders, recursiveForwarderPc)}
                        <div id="scoped-anycast-card">${summaryCard("Anycast", anycastCount, "Anycast", anycastCount, "Other", anycastOther, anycastPc, loadingText())}</div>
                        <div id="scoped-qmin-card">${summaryCard("QMIN", 0, "Yes", 0, "No", 0, 0, loadingText())}</div>
                        <div id="scoped-spoofing-card">${spoofingCard(0, 0, 0, 0)}</div>
                        ${dnssecCard}
                    </div>
                </div>
            `;

            let completed = 0;
            let failed = 0;
            const total = isCountry ? 4 : 3;
            const markDone = () => {
                completed += 1;
                if (completed === total) {
                    setStatus(
                        failed ? `${scopeLabel} loaded with ${failed} failed enrichment request${failed === 1 ? "" : "s"}.` : `${scopeLabel} loaded.`,
                        failed ? "error" : "ok",
                    );
                }
            };

            fetchApiPath(`${targetPath}/qmin`)
                .then((qmin) => {
                    const qminMeasured = Number(qmin.measured_count || 0);
                    const qminYes = Number(qmin.yes_count || 0);
                    const qminNo = Number(qmin.no_count || 0);
                    const qminUnstable = Number(qmin.unstable_count || 0);
                    const qminUnknown = Math.max(resolverTotal - qminMeasured, 0);
                    const qminYesPc = qminMeasured ? (qminYes / qminMeasured) * 100 : 0;
                    setHtml("scoped-qmin-card", summaryCard("QMIN", qminMeasured, "Yes", qminYes, "No", qminNo, qminYesPc, `${formatNumber(qminUnstable)} unstable / ${formatNumber(qminUnknown)} not measured`));
                })
                .catch(() => { failed += 1; setLoadingError("scoped-qmin-card"); })
                .finally(markDone);

            Promise.all([
                fetchApiPath(`${targetPath}/anycast`),
                fetchApiPath(`${targetPath}/anycast/sites`),
            ])
                .then(([anycast, sites]) => {
                    const countryInstances = (sites.countries || []).reduce((sum, row) => sum + Number(row.count || 0), 0);
                    const asnInstances = (sites.asns || []).reduce((sum, row) => sum + Number(row.count || 0), 0);
                    setHtml("scoped-anycast-card", summaryCard("Anycast", anycastCount, "Anycast", anycastCount, "Other", anycastOther, anycastPc, `${formatNumber(anycast.prefix_count || 0)} prefixes / ${formatNumber(countryInstances)} country instances / ${formatNumber(asnInstances)} ASN instances`));
                })
                .catch(() => { failed += 1; setLoadingError("scoped-anycast-card"); })
                .finally(markDone);

            fetchApiPath(`${targetPath}/spoofing`)
                .then((spoofing) => {
                    setHtml(
                        "scoped-spoofing-card",
                        spoofingCard(
                            Number(spoofing.spoofing_prefix_count || 0),
                            Number(spoofing.spoofing_blocked_count || 0),
                            Number(spoofing.spoofing_allow_count || 0),
                            Number(spoofing.spoofing_unknown_count || 0),
                        ),
                    );
                })
                .catch(() => { failed += 1; setLoadingError("scoped-spoofing-card"); })
                .finally(markDone);

            if (isCountry) {
                fetchApiPath(`${targetPath}/dnssec`)
                    .then((dnssec) => {
                        const dnssecValidating = dnssec.dnssec_validating_pc ?? 0;
                        const detail = dnssec.dnssec_validating_pc == null ? "No country-level DNSSEC data" : "Country-level validation";
                        setHtml("scoped-dnssec-card", gauge("DNSSEC validating", dnssecValidating, detail));
                    })
                    .catch(() => { failed += 1; setLoadingError("scoped-dnssec-card"); })
                    .finally(markDone);
            }
        }

        function renderResolverLookupAsync(query) {
            results.innerHTML = `
                <div class="tile">
                    <div class="tile-header">
                        <div class="tile-title resolver-lookup-title">${query}</div>
                    </div>
                    <div class="empty">${loadingText()}</div>
                </div>
            `;
            const summaryEndpoint = `${apiBaseUrl}/api/dns-resilience/resolver/${encodeURIComponent(query)}/summary`;
            fetch(summaryEndpoint)
                .then(async (response) => {
                    const payload = await response.json();
                    if (!response.ok) {
                        throw new Error(payload.detail || payload.error || "Lookup failed.");
                    }
                    return payload;
                })
                .then((summaryPayload) => {
                    setStatus("Resolver summary loaded.", "ok");
                    renderResolverSummary(summaryPayload);
                })
                .catch((error) => {
                    setStatus("Resolver summary failed to load.", "error");
                    results.innerHTML = `<div class="empty">${error}</div>`;
                });
        }

        function renderResolverSummary(summary) {
            const checkmark = (value) => {
                if (value === null || value === undefined) {
                    return "-";
                }
                const cls = value ? "checkmark" : "checkmark off";
                const symbol = value ? "✓" : "✕";
                return `<span class="${cls}">${symbol}</span>`;
            };

            const forwarderCounts = summary.forwarder_countries || [];
            const forwarderAsnCounts = summary.forwarder_asns || [];
            const forwarderGraphId = `forwarder-${Date.now()}`;
            const forwarderCountryTabId = `forwarder-country-tab-${Date.now()}`;
            const forwarderAsnTabId = `forwarder-asn-tab-${Date.now()}`;

            const mapId = `map-${Date.now()}`;
            const lastObservation = summary.last_observation_ts
                ? new Date(summary.last_observation_ts).toLocaleString()
                : "-";
            const valueOrUnknown = (value) => {
                if (value === null || value === undefined || value === "") {
                    return `<span class="unknown-badge">UNKNOWN</span>`;
                }
                return value;
            };
            const metadataCard = (label, value) => `
                <div class="metadata-card">
                    <div class="metadata-label">${label}</div>
                    <div class="metadata-value">${valueOrUnknown(value)}</div>
                </div>
            `;
            const qminState = summary.resolver_qmin || null;
            const qminYes = qminState === "yes" ? 1 : 0;
            const qminNo = qminState === "no" ? 1 : 0;
            const qminUnstable = qminState === "unstable" ? 1 : 0;
            const searchLink = (value, label = value) => `<a class="ip-chip" href="/search.html?q=${encodeURIComponent(value)}">${label}</a>`;
            const resolverAsn = summary.resolver_asn == null ? null : searchLink(`AS${summary.resolver_asn}`);
            const resolverCountry = summary.resolver_country ? searchLink(summary.resolver_country) : null;
            const resolverPrefix = summary.resolver_prefix ? searchLink(summary.resolver_prefix) : null;
            const siblingIps = summary.sibling_resolver_ips || [];
            const siblingIpHtml = siblingIps.length
                ? `<div class="ip-list sibling-ip-list">${siblingIps.map((ip) => searchLink(ip)).join("")}</div>`
                : `<span class="unknown-badge">UNKNOWN</span>`;
            const resolverDomains = summary.resolver_domains || [];
            const domainHtml = resolverDomains.length
                ? `<div class="ip-list">${resolverDomains.map((domain) => searchLink(domain)).join("")}</div>`
                : summary.resolver_domain;
            const services = summary.resolver_services || (summary.resolver_supported_protocols || "")
                .split(",")
                .map((service) => service.trim())
                .filter(Boolean);
            const serviceHtml = services.length
                ? `<div class="ip-list">${services.map((service) => searchLink(service.toLowerCase())).join("")}</div>`
                : null;
            const spoofingTotal = Number(summary.spoofing_prefix_count || 0);
            const spoofingAllow = Number(summary.spoofing_allow_count || 0);
            const spoofingBlocked = Number(summary.spoofing_blocked_count || 0);
            const spoofingUnknown = Number(summary.spoofing_unknown_count || 0);
            const spoofingPrefixes = summary.spoofing_allow_prefixes || [];
            const spoofingPrefixHtml = spoofingPrefixes.length
                ? `<div class="ip-list">${spoofingPrefixes.map((entry) => `<span class="ip-chip">${entry.prefix}</span>`).join("")}</div>`
                : null;

            results.innerHTML = `
                <div class="tile">
                    <div class="tile-header">
                        <div class="tile-title resolver-lookup-title">${summary.resolver_ip}</div>
                    </div>
                    <div class="resolver-summary-grid">
                        ${summaryCard("Resolver", summary.resolver_found ? 1 : 0, "IPv4", summary.resolver_supports_ipv4 ? 1 : 0, "IPv6", summary.resolver_supports_ipv6 ? 1 : 0, summary.resolver_found ? 100 : 0, `Public: ${summary.resolver_is_public === null || summary.resolver_is_public === undefined ? "unknown" : (summary.resolver_is_public ? "yes" : "no")}`)}
                        ${summaryCard("Forwarders", summary.forwarder_entry_count ?? 0, "ASNs", summary.forwarder_asn_count ?? 0, "Countries", summary.forwarder_country_count ?? 0, summary.forwarder_entry_count ? 100 : 0, `Open forwarder IPs relaying to ${summary.resolver_ip}`)}
                        ${summaryCard("Anycast", summary.anycast_found ? (summary.anycast_site_count ?? 0) : 0, "Countries", summary.anycast_country_count ?? 0, "ASNs", summary.anycast_asn_count ?? 0, summary.anycast_found ? 100 : 0, summary.anycast_found ? "Anycast sites" : "No anycast sites")}
                        ${summaryCard("QMIN", qminState ? 1 : 0, "Yes", qminYes, "No", qminNo, qminState === "yes" ? 100 : 0, qminState ? `${qminState}${qminUnstable ? " / unstable" : ""}` : "UNKNOWN")}
                        ${spoofingCard(spoofingTotal, spoofingBlocked, spoofingAllow, spoofingUnknown)}
                    </div>
                    <div class="metadata-grid">
                        ${metadataCard("ASN", resolverAsn)}
                        ${metadataCard("Country", resolverCountry)}
                        ${metadataCard("BGP prefix", resolverPrefix)}
                        ${metadataCard("Domain names", domainHtml)}
                        ${metadataCard("Organization", summary.resolver_org)}
                        ${metadataCard("Protocol:port", serviceHtml)}
                        ${metadataCard("Last observed", lastObservation === "-" ? null : lastObservation)}
                        <div class="metadata-card">
                            <div class="metadata-label">Sibling resolver IPs</div>
                            <div class="metadata-value">${siblingIpHtml}</div>
                        </div>
                        ${metadataCard("IPv4 support", summary.resolver_found ? checkmark(summary.resolver_supports_ipv4) : null)}
                        ${metadataCard("IPv6 support", summary.resolver_found ? checkmark(summary.resolver_supports_ipv6) : null)}
                        ${metadataCard("QMIN", qminState)}
                        ${metadataCard("Spoofing prefixes allowing spoofing", spoofingPrefixHtml)}
                    </div>
                    <div class="map-wrap" id="${mapId}"></div>
                    <div class="graph-section">
                        <div class="tile-header">
                            <div class="tile-title">Top 10 open forwarders that relay queries to ${summary.resolver_ip}</div>
                            <div>
                                <button class="graph-toggle" id="${forwarderCountryTabId}" type="button">Countries</button>
                                <button class="graph-toggle" id="${forwarderAsnTabId}" type="button">ASNs</button>
                            </div>
                        </div>
                        <div class="graph-wrap" id="${forwarderGraphId}"></div>
                    </div>
                </div>
            `;

            if (summary.anycast_countries && summary.anycast_countries.length > 0) {
                initMap(mapId, summary.anycast_countries);
            } else {
                const mapEl = document.getElementById(mapId);
                if (mapEl) {
                    mapEl.innerHTML = `<div class="empty" style="padding: 16px;">No anycast country data to display.</div>`;
                }
            }

            const graphEl = document.getElementById(forwarderGraphId);
            const countryTabEl = document.getElementById(forwarderCountryTabId);
            const asnTabEl = document.getElementById(forwarderAsnTabId);
            if (graphEl) {
                if (!forwarderCounts.length && !forwarderAsnCounts.length) {
                    graphEl.innerHTML = `<div class="empty">No forwarder relay data to display.</div>`;
                } else {
                    let mode = "country";

                    const renderForwarderGraph = () => {
                        const sourceRows = mode === "asn" ? forwarderAsnCounts : forwarderCounts;
                        const sorted = [...sourceRows].sort((a, b) => b.count - a.count);
                        const entries = sorted.slice(0, 10);
                        const totalCount = entries.reduce((sum, entry) => sum + (entry.count || 0), 0);

                        if (!entries.length) {
                            graphEl.innerHTML = `<div class="empty">No forwarder ${mode === "asn" ? "ASN" : "country"} data to display.</div>`;
                            return;
                        }

                        const labels = [
                            ...entries.map((entry) => mode === "asn" ? `AS${entry.asn}` : (entry.country || "-")),
                            `${summary.resolver_ip} (${totalCount})`,
                        ];
                        const resolverIndex = labels.length - 1;

                        const sources = entries.map((_, index) => index);
                        const targets = entries.map(() => resolverIndex);
                        const values = entries.map((entry) => entry.count || 0);

                        const data = [
                            {
                                type: "sankey",
                                orientation: "h",
                                node: {
                                    label: labels,
                                    pad: 18,
                                    thickness: 20,
                                    color: [
                                        ...entries.map(() => "#d9f2ef"),
                                        "#5BC2C2",
                                    ],
                                    line: {
                                        color: [
                                            ...entries.map(() => "#5BC2C2"),
                                            "#4aa9a9",
                                        ],
                                        width: 1,
                                    },
                                },
                                link: {
                                    source: sources,
                                    target: targets,
                                    value: values,
                                    color: values.map(() => "rgba(91, 194, 194, 0.35)"),
                                },
                            },
                        ];

                        const layout = {
                            margin: { l: 20, r: 20, t: 10, b: 10 },
                            paper_bgcolor: "#ffffff",
                            plot_bgcolor: "#ffffff",
                            font: {
                                family: "Open Sans, Arial, Helvetica, sans-serif",
                                color: "#1f2430",
                                size: 12,
                            },
                        };

                        loadPlotly()
                            .then(() => {
                                Plotly.react(graphEl, data, layout, {
                                    displayModeBar: true,
                                    responsive: true,
                                    scrollZoom: true,
                                });
                            })
                            .catch(() => {
                                graphEl.innerHTML = `<div class="empty">Plotly failed to load.</div>`;
                            });
                    };

                    renderForwarderGraph();

                    if (countryTabEl) {
                        countryTabEl.addEventListener("click", () => {
                            mode = "country";
                            renderForwarderGraph();
                        });
                    }
                    if (asnTabEl) {
                        asnTabEl.addEventListener("click", () => {
                            mode = "asn";
                            renderForwarderGraph();
                        });
                    }
                }
            }
        }

        function initMap(containerId, countries) {
            const map = L.map(containerId, {
                zoomControl: true,
                scrollWheelZoom: true,
            }).setView([20, 0], 2);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "&copy; OpenStreetMap contributors",
            }).addTo(map);

            countries.forEach((country) => {
                if (country.latitude == null || country.longitude == null) {
                    return;
                }
                const siteCount = Math.max(0, Number(country.site_count) || 0);
                const radius = Math.min(18, 4 + Math.log10(siteCount + 1) * 6);
                L.circleMarker([country.latitude, country.longitude], {
                    radius,
                    fillColor: "#5BC2C2",
                    color: "#5BC2C2",
                    weight: 1,
                    fillOpacity: 0.7,
                })
                    .addTo(map)
                    .bindTooltip(`${country.country}: ${country.site_count} site(s)`);
            });
        }

        function initResolverCountryMap(containerId, countries) {
            const map = L.map(containerId, {
                zoomControl: true,
                scrollWheelZoom: true,
            }).setView([20, 0], 2);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "&copy; OpenStreetMap contributors",
            }).addTo(map);

            countries.forEach((country) => {
                if (country.latitude == null || country.longitude == null) {
                    return;
                }
                const count = Math.max(0, Number(country.count) || 0);
                const publicCount = Number(country.public_count) || 0;
                const publicPc = count ? (publicCount / count) * 100 : 0;
                const radius = Math.min(28, 5 + Math.log10(count + 1) * 7);
                L.circleMarker([country.latitude, country.longitude], {
                    radius,
                    fillColor: publicPc >= 50 ? "#2fb48f" : "#f0a34a",
                    color: "#26364f",
                    weight: 1,
                    fillOpacity: 0.72,
                })
                    .addTo(map)
                    .bindTooltip(`${country.country}: ${formatNumber(count)} resolvers, ${publicPc.toFixed(1)}% public`);
            });
        }

        async function runLookup() {
            const rawQuery = input.value.trim();
            const query = singleAddressFromPrefix(rawQuery) || rawQuery;
            const type = detectQueryType(query);
            if (!type) {
                setStatus("Enter an IP, domain, prefix, ASN, or country code.", "error");
                return;
            }

            setStatus("Fetching resolver data...", "pending");
            results.innerHTML = `<div class="empty">Loading... <span class="spinner" aria-hidden="true"></span></div>`;

            try {
                if (type === "resolver") {
                    setStatus("Loading resolver summary...", "pending");
                    renderResolverLookupAsync(query);
                    return;
                }

                const endpoint = buildEndpoint(query, type);
                if (!endpoint) {
                    setStatus("Unable to build endpoint for query.", "error");
                    return;
                }
                const response = await fetch(endpoint);
                const payload = await response.json();
                if (!response.ok) {
                    setStatus(payload.detail || payload.error || "Lookup failed.", "error");
                    results.innerHTML = `<div class="empty">${payload.detail || payload.error || "Request failed."}</div>`;
                    return;
                }
                if (type === "country" || type === "asn") {
                    setStatus("Loading summary details...", "pending");
                    renderScopedResultsAsync(payload, type);
                    return;
                }
                setStatus(`Found ${payload.total} resolver(s).`, "ok");
                renderResults(payload);
            } catch (error) {
                setStatus("Network error while reaching the API.", "error");
                results.innerHTML = `<div class="empty">${error}</div>`;
            }
        }

        document.getElementById("search-button").addEventListener("click", runLookup);
        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                runLookup();
            }
        });

        document.querySelectorAll(".chip").forEach((chip) => {
            chip.addEventListener("click", () => {
                input.value = chip.dataset.value;
                runLookup();
            });
        });

        const initialQuery = new URLSearchParams(window.location.search).get("q");
        if (initialQuery) {
            input.value = initialQuery;
            runLookup();
        }
    </script>
{% endblock %}
