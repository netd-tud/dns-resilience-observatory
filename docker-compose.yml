services:
  postgres:
    image: postgres:18
    container_name: dns-resilience-observatory-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./db/postgresdb_vol:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api_db_network

  api:
    build:
      context: .
    container_name: dns-resilience-observatory-api
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      DATABASE_ENGINE: postgresql
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "api,localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: "http://localhost:8001,http://frontend:8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - api_db_network
      - api_frontend_network

  frontend:
    build:
      context: .
    container_name: dns-resilience-observatory-frontend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      DATABASE_ENGINE: sqlite
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "frontend,localhost,127.0.0.1"
      API_BASE_URL: "http://api:8000"
    ports:
      - "8001:8000"
    depends_on:
      - api
    networks:
      - api_frontend_network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: dns-resilience-observatory-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - ./db/pgadmin_vol:/var/lib/pgadmin
      - ./db/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - api_db_network

networks:
  api_db_network:
    driver: bridge
  api_frontend_network:
    driver: bridge
